name: Build SUSE Updater

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2 file desktop-file-utils
        
    - name: Setup AppImage Tool
      run: |
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        
    - name: Prepare AppDir (Niess Python Base)
      run: |
        wget https://github.com/niess/python-appimage/releases/download/python3.9/python3.9.25-cp39-cp39-manylinux2014_x86_64.AppImage -O python.AppImage
        chmod +x python.AppImage
        ./python.AppImage --appimage-extract
        mv squashfs-root AppDir
        rm python.AppImage
        
    - name: Install Application
      run: |
        PYTHON=./AppDir/opt/python3.9/bin/python3.9
        PIP=./AppDir/opt/python3.9/bin/pip3.9
        $PYTHON -m pip install --upgrade pip
        $PIP install -r requirements.txt
        
    - name: Configure AppDir
      run: |
        mkdir -p AppDir/usr/bin
        # Copy source files
        cp -r main.py i18n.py update_checker.py updater_runner.py ui assets install_sudoers.sh AppDir/
        
        # Metadata Cleanup & Required Directories
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
        mkdir -p AppDir/usr/share/metainfo
        
        # Remove base image junk to avoid validation errors
        rm -f AppDir/usr/share/metainfo/python3.9.25.appdata.xml
        
        # Metadata Placement
        cp io.github.madroots.suse-updater.metainfo.xml AppDir/usr/share/metainfo/
        
        # Icon
        cp -f assets/icons/tray_green.svg AppDir/usr/share/icons/hicolor/scalable/apps/io.github.madroots.suse-updater.svg
        ln -sf usr/share/icons/hicolor/scalable/apps/io.github.madroots.suse-updater.svg AppDir/io.github.madroots.suse-updater.svg
        ln -sf io.github.madroots.suse-updater.svg AppDir/.DirIcon
        
        # Desktop Reference
        cat > AppDir/usr/share/applications/io.github.madroots.suse-updater.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=SUSE Updater
        Exec=suse-updater
        Icon=io.github.madroots.suse-updater
        Categories=Qt;System;
        Comment=Safe and simple updates for OpenSUSE Tumbleweed
        Terminal=false
        StartupWMClass=io.github.madroots.suse-updater
        X-AppImage-Name=SUSE Updater
        X-AppImage-Identifier=io.github.madroots.suse-updater
        X-AppImage-Version=0.1.6
        EOF
        
        # Links for compat
        ln -sf usr/share/applications/io.github.madroots.suse-updater.desktop AppDir/io.github.madroots.suse-updater.desktop
        ln -sf io.github.madroots.suse-updater.desktop AppDir/suse-updater.desktop
        
        # AppRun script
        find AppDir -name AppRun -delete
        cat > AppDir/AppRun <<'EOF'
        #!/bin/bash
        HERE=$(dirname "$(readlink -f "$0")")
        export PYTHONHOME="$HERE/opt/python3.9"
        export PYTHONPATH="$HERE/opt/python3.9/lib/python3.9/site-packages:$HERE"
        export PATH="$HERE/opt/python3.9/bin:$PATH"
        export LD_LIBRARY_PATH="$HERE/opt/python3.9/lib:$HERE/opt/python3.9/lib/python3.9/site-packages/PySide6/Qt/lib:$LD_LIBRARY_PATH"
        export QT_PLUGIN_PATH="$HERE/opt/python3.9/lib/python3.9/site-packages/PySide6/Qt/plugins"
        export QT_X11_NO_MITSHM=1
        exec "$HERE/opt/python3.9/bin/python3.9" "$HERE/main.py" "$@"
        EOF
        chmod +x AppDir/AppRun
        
    - name: Package AppImage
      env:
        ARCH: x86_64
      run: ./appimagetool-x86_64.AppImage AppDir SUSE-Updater-x86_64.AppImage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SUSE-Updater-Linux
        path: SUSE-Updater-x86_64.AppImage
