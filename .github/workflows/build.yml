name: Build SUSE Updater

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfuse2 file desktop-file-utils
        
    - name: Setup AppImage Tool
      run: |
        wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        
    - name: Prepare AppDir (Niess Python Base)
      run: |
        wget https://github.com/niess/python-appimage/releases/download/python3.9/python3.9.25-cp39-cp39-manylinux2014_x86_64.AppImage -O python.AppImage
        chmod +x python.AppImage
        ./python.AppImage --appimage-extract
        mv squashfs-root AppDir
        rm python.AppImage
        
    - name: Install Application
      run: |
        PYTHON=./AppDir/opt/python3.9/bin/python3.9
        PIP=./AppDir/opt/python3.9/bin/pip3.9
        $PYTHON -m pip install --upgrade pip
        $PIP install -r requirements.txt
        
    - name: Configure AppDir
      run: |
        mkdir -p AppDir/usr/bin
        # Copy source files
        cp -r main.py i18n.py update_checker.py updater_runner.py ui assets install_sudoers.sh AppDir/
        
        # Metadata Cleanup & Required Directories
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
        mkdir -p AppDir/usr/share/metainfo
        
        # Remove base image junk to avoid validation errors
        rm -f AppDir/usr/share/metainfo/python3.9.25.appdata.xml
        
        # Metadata Placement (Physical file in root for Gear Lever)
        printf "[Desktop Entry]\n\
        Type=Application\n\
        Name=SUSE Updater\n\
        Exec=io.github.madroots.suse-updater\n\
        Icon=io.github.madroots.suse-updater\n\
        Categories=Utility;System;Qt;\n\
        Comment=Safe and simple updates for OpenSUSE Tumbleweed\n\
        Terminal=false\n\
        StartupWMClass=io.github.madroots.suse-updater\n\
        X-AppImage-Name=SUSE Updater\n\
        X-AppImage-Identifier=io.github.madroots.suse-updater\n\
        X-AppImage-Version=0.1.7\n" | sed 's/^ *//' > AppDir/io.github.madroots.suse-updater.desktop
        
        # internal directory structure for AppStream/system compatibility
        ln -sf ../../../io.github.madroots.suse-updater.desktop AppDir/usr/share/applications/io.github.madroots.suse-updater.desktop
        
        # Icon (Physical in system path, links in root)
        cp -f assets/icons/tray_green.svg AppDir/usr/share/icons/hicolor/scalable/apps/io.github.madroots.suse-updater.svg
        ln -sf usr/share/icons/hicolor/scalable/apps/io.github.madroots.suse-updater.svg AppDir/io.github.madroots.suse-updater.svg
        ln -sf io.github.madroots.suse-updater.svg AppDir/.DirIcon
        
        # Compatibility Links
        ln -sf io.github.madroots.suse-updater.desktop AppDir/suse-updater.desktop
        
        # Binary links
        ln -sf ../../AppRun AppDir/usr/bin/suse-updater
        ln -sf ../../AppRun AppDir/usr/bin/io.github.madroots.suse-updater
        
        # AppRun script (re-create to ensure clean paths)
        find AppDir -name AppRun -delete
        printf "#!/bin/bash\n\
        HERE=\$(dirname \"\$(readlink -f \"\$0\")\")\n\
        export PYTHONHOME=\"\$HERE/opt/python3.9\"\n\
        export PYTHONPATH=\"\$HERE/opt/python3.9/lib/python3.9/site-packages:\$HERE\"\n\
        export PATH=\"\$HERE/opt/python3.9/bin:\$PATH\"\n\
        export LD_LIBRARY_PATH=\"\$HERE/opt/python3.9/lib:\$HERE/opt/python3.9/lib/python3.9/site-packages/PySide6/Qt/lib:\$LD_LIBRARY_PATH\"\n\
        export QT_PLUGIN_PATH=\"\$HERE/opt/python3.9/lib/python3.9/site-packages/PySide6/Qt/plugins\"\n\
        export QT_X11_NO_MITSHM=1\n\
        exec \"\$HERE/opt/python3.9/bin/python3.9\" \"\$HERE/main.py\" \"\$@\"\n" | sed 's/^ *//' > AppDir/AppRun
        chmod +x AppDir/AppRun
        
    - name: Package AppImage
      env:
        ARCH: x86_64
      run: ./appimagetool-x86_64.AppImage AppDir SUSE-Updater-x86_64.AppImage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SUSE-Updater-Linux
        path: SUSE-Updater-x86_64.AppImage
